services:
  - type: web
    name: msme-lending-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Adjust based on your preferred Python version
      - key: DATABASE_URL
        sync: false # You will set this in the Render dashboard using your Supabase URL
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
